let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,v=0.1,t='sine'){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function playHeartbeat(i){if(!audioCtx)return;const v=Math.min(0.3,i*0.15);playTone(40,0.15,v,'sine');setTimeout(()=>playTone(50,0.1,v*0.7,'sine'),150)}
function playFootstep(){playTone(80+Math.random()*40,0.05,0.05,'square')}
function playPickup(){playTone(600,0.1,0.15,'sine');setTimeout(()=>playTone(800,0.15,0.15,'sine'),100)}
function playScare(){playTone(100,1.5,0.4,'sawtooth');playTone(150,1.5,0.3,'square');playTone(50,2,0.35,'sine')}
function playHide(){playTone(200,0.2,0.08,'triangle')}
function playDoor(){playTone(150,0.15,0.1,'square')}
function playWin(){[400,500,600,800].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,0.15,'sine'),i*200))}
function playAmbient(){if(!audioCtx)return;const b=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.008;const s=audioCtx.createBufferSource();s.buffer=b;s.loop=true;const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=200;s.connect(f);f.connect(audioCtx.destination);s.start()}

const TILE=32,COLS=50,ROWS=38;
const MAP=[];
function buildMap(){
  for(let y=0;y<ROWS;y++){MAP[y]=[];for(let x=0;x<COLS;x++)MAP[y][x]=1}
  function room(rx,ry,rw,rh){for(let y=ry;y<ry+rh;y++)for(let x=rx;x<rx+rw;x++)if(y>ry&&y<ry+rh-1&&x>rx&&x<rx+rw-1)MAP[y][x]=0}
  function corridor(x1,y1,x2,y2){let cx=x1,cy=y1;while(cx!==x2){MAP[cy][cx]=0;cx+=cx<x2?1:-1}while(cy!==y2){MAP[cy][cx]=0;cy+=cy<y2?1:-1}MAP[cy][cx]=0}
  room(1,25,12,10);room(16,13,18,14);room(1,2,14,10);room(35,2,14,10);room(35,25,14,12);room(20,1,10,6);room(1,14,10,8);room(38,14,10,8);
  corridor(12,29,17,20);corridor(7,12,7,14);corridor(10,7,17,17);corridor(33,7,36,7);corridor(33,20,36,20);corridor(43,21,43,26);corridor(25,7,25,2);corridor(10,21,17,21);corridor(33,29,36,29);
  [[12,29],[17,20],[7,13],[10,7],[33,7],[33,20],[43,22],[25,7],[10,21],[33,29],[17,17],[36,7],[36,20],[36,29]].forEach(([x,y])=>{if(MAP[y]&&MAP[y][x]!==undefined)MAP[y][x]=6});
  MAP[29][4]=4;MAP[2][25]=5;MAP[2][24]=5;MAP[18][25]=7;
  [[3,27],[9,27],[3,31],[5,5],[11,5],[37,5],[46,5],[37,29],[46,29],[3,16],[3,19],[44,16],[44,19],[20,15],[31,15],[20,24],[31,24]].forEach(([x,y])=>{if(MAP[y]&&MAP[y][x]===0)MAP[y][x]=2});
  [[7,4],[43,4],[5,17],[44,17],[43,30]].forEach(([x,y])=>{if(MAP[y]&&MAP[y][x]===0)MAP[y][x]=3});
}

let state='title',player={x:4,y:29,moveTimer:0,dir:0,walkFrame:0},
    satoshi={x:25,y:18,moveTimer:0,alert:0,chasing:false,path:[],lastSeen:null,speed:12},
    seals=[],sealsCollected=0,lives=3,night=1,hideSpot=null,
    gameTime=0,heartbeatTimer=0,stepTimer=0,particles=[],flickerTime=0,

    keys={},touchDir=null,touchAction=false;

function initGame(){
  buildMap();player={x:4,y:29,moveTimer:0,dir:0,walkFrame:0};
  satoshi={x:25,y:18,moveTimer:0,alert:0,chasing:false,path:[],lastSeen:null,speed:12};
  seals=[];sealsCollected=0;exitOpen=false;hideSpot=null;gameTime=0;particles=[];msgText='';msgTimer=0;
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(MAP[y][x]===3)seals.push({x,y,collected:false});
  showMsg("Find 5 Blood Seals to open the exit gate...");
}
function showMsg(t){msgText=t;msgTimer=240}
function isWalkable(x,y){if(x<0||x>=COLS||y<0||y>=ROWS)return false;return MAP[y][x]!==1}
function findPath(sx,sy,gx,gy){
  const open=[{x:sx,y:sy,g:0,h:0,f:0,p:null}],closed=new Set(),key=(x,y)=>y*COLS+x;
  while(open.length>0){open.sort((a,b)=>a.f-b.f);const c=open.shift();if(c.x===gx&&c.y===gy){const p=[];let n=c;while(n.p){p.unshift({x:n.x,y:n.y});n=n.p}return p}closed.add(key(c.x,c.y));for(const[dx,dy]of[[0,-1],[0,1],[-1,0],[1,0]]){const nx=c.x+dx,ny=c.y+dy;if(!isWalkable(nx,ny)||closed.has(key(nx,ny)))continue;const g=c.g+1,h=Math.abs(nx-gx)+Math.abs(ny-gy);const e=open.find(n=>n.x===nx&&n.y===ny);if(e){if(g<e.g){e.g=g;e.f=g+h;e.p=c}}else open.push({x:nx,y:ny,g,h,f:g+h,p:c})}if(closed.size>800)return[]}return[]
}
function hasLOS(x1,y1,x2,y2){const dx=Math.abs(x2-x1),dy=Math.abs(y2-y1),sx=x1<x2?1:-1,sy=y1<y2?1:-1;let err=dx-dy,cx=x1,cy=y1;while(cx!==x2||cy!==y2){if(MAP[cy][cx]===1)return false;const e2=err*2;if(e2>-dy){err-=dy;cx+=sx}if(e2<dx){err+=dx;cy+=sy}}return true}

// Draw player as a 2D child character
function drawPlayer(px,py){
  const cx=px+TILE/2,cy=py+TILE/2;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(cx,py+TILE-2,8,3,0,0,Math.PI*2);ctx.fill();
  // Body (blue hoodie)
  ctx.fillStyle='#3a5f8a';
  ctx.fillRect(cx-7,cy-2,14,14);
  // Arms
  const armSwing=Math.sin(player.walkFrame*0.3)*3;
  ctx.fillStyle='#3a5f8a';
  ctx.fillRect(cx-9,cy+armSwing,4,10);ctx.fillRect(cx+5,cy-armSwing,4,10);
  // Hands
  ctx.fillStyle='#e8c4a0';
  ctx.fillRect(cx-9,cy+10+armSwing,4,3);ctx.fillRect(cx+5,cy+10-armSwing,4,3);
  // Legs
  const legSwing=Math.sin(player.walkFrame*0.3)*4;
  ctx.fillStyle='#2a3a5a';
  ctx.fillRect(cx-5,cy+12,5,8+legSwing);ctx.fillRect(cx,cy+12,5,8-legSwing);
  // Shoes
  ctx.fillStyle='#1a1a2a';
  ctx.fillRect(cx-6,cy+20+legSwing,6,3);ctx.fillRect(cx,cy+20-legSwing,6,3);
  // Head
  ctx.fillStyle='#e8c4a0';ctx.beginPath();ctx.arc(cx,cy-8,8,0,Math.PI*2);ctx.fill();
  // Hair (dark messy)
  ctx.fillStyle='#2a1a0a';ctx.beginPath();ctx.arc(cx,cy-10,8,Math.PI,Math.PI*2);ctx.fill();
  ctx.fillRect(cx-8,cy-12,3,6);ctx.fillRect(cx+5,cy-12,3,5);
  // Eyes (scared wide)
  ctx.fillStyle='#fff';ctx.fillRect(cx-5,cy-9,4,3);ctx.fillRect(cx+1,cy-9,4,3);
  ctx.fillStyle='#1a1a3a';ctx.fillRect(cx-4,cy-9,2,3);ctx.fillRect(cx+2,cy-9,2,3);
  // Lantern
  ctx.fillStyle='#c8a040';ctx.fillRect(cx+9,cy+2,4,6);
  ctx.fillStyle='rgba(255,200,80,0.8)';ctx.beginPath();ctx.arc(cx+11,cy+1,3,0,Math.PI*2);ctx.fill();
}

// Draw Satoshi using actual image sprite
function drawSatoshi(sx,sy,alpha){
  ctx.save();ctx.globalAlpha=alpha;
  const glow=satoshi.chasing?0.5+Math.sin(gameTime*0.15)*0.3:0;
  if(glow>0){ctx.shadowColor='rgba(255,0,0,0.8)';ctx.shadowBlur=20+glow*15}
  if(satoshiSprite.complete){
    const iw=TILE+8,ih=iw*(satoshiSprite.naturalHeight/satoshiSprite.naturalWidth);
    ctx.drawImage(satoshiSprite,sx-4,sy-ih+TILE+4,iw,ih);
  }
  ctx.shadowBlur=0;
  // Alert indicator
  if(satoshi.alert>0.1){
    ctx.fillStyle=`rgba(255,0,0,${satoshi.alert*0.9})`;ctx.font='bold 18px Georgia';ctx.textAlign='center';
    ctx.fillText(satoshi.chasing?'!':'?',sx+TILE/2,sy-14);
  }
  ctx.restore();
}

function update(){
  if(state!=='playing'&&state!=='hiding')return;
  gameTime++;flickerTime+=0.05;
  if(state==='playing'){
    player.moveTimer--;
    if(player.moveTimer<=0){
      let dx=0,dy=0;
      if(keys['ArrowUp']||keys['w']||keys['W']||touchDir==='up')dy=-1;
      if(keys['ArrowDown']||keys['s']||keys['S']||touchDir==='down')dy=1;
      if(keys['ArrowLeft']||keys['a']||keys['A']||touchDir==='left')dx=-1;
      if(keys['ArrowRight']||keys['d']||keys['D']||touchDir==='right')dx=1;
      if(dx!==0||dy!==0){
        const nx=player.x+dx,ny=player.y+dy;
        if(isWalkable(nx,ny)){player.x=nx;player.y=ny;player.moveTimer=5;player.walkFrame++;
          stepTimer--;if(stepTimer<=0){playFootstep();stepTimer=8}
          seals.forEach(s=>{if(!s.collected&&s.x===player.x&&s.y===player.y){s.collected=true;sealsCollected++;playPickup();showMsg(`Blood Seal collected! (${sealsCollected}/5)`);if(sealsCollected>=5){exitOpen=true;showMsg("The exit gate is now OPEN! Escape!")}}});
          if(MAP[player.y][player.x]===5&&exitOpen){state='win';playWin()}
          if(MAP[player.y][player.x]===6)playDoor();
        }
      }
    }
    if(keys[' ']||keys['e']||keys['E']||touchAction){touchAction=false;if(MAP[player.y][player.x]===2){state='hiding';hideSpot={x:player.x,y:player.y};playHide();showMsg("Hiding... (press SPACE to leave)")}}
  }else if(state==='hiding'){if(keys[' ']||keys['e']||keys['E']||touchAction){touchAction=false;state='playing';hideSpot=null;showMsg("You left your hiding spot.")}}
  // Satoshi AI
  const dist=Math.abs(satoshi.x-player.x)+Math.abs(satoshi.y-player.y);
  const canSee=state==='playing'&&dist<12&&hasLOS(satoshi.x,satoshi.y,player.x,player.y);
  if(canSee){satoshi.chasing=true;satoshi.alert=Math.min(satoshi.alert+0.05,1);satoshi.lastSeen={x:player.x,y:player.y};satoshi.path=findPath(satoshi.x,satoshi.y,player.x,player.y)}
  else{satoshi.alert=Math.max(satoshi.alert-0.005,0);if(satoshi.alert<=0)satoshi.chasing=false}
  satoshi.moveTimer--;const spd=satoshi.chasing?Math.max(4,satoshi.speed-4):satoshi.speed;
  if(satoshi.moveTimer<=0){satoshi.moveTimer=spd;
    if(satoshi.path.length>0){const n=satoshi.path.shift();satoshi.x=n.x;satoshi.y=n.y}
    else if(!satoshi.chasing){const dirs=[[0,-1],[0,1],[-1,0],[1,0]].filter(([dx,dy])=>isWalkable(satoshi.x+dx,satoshi.y+dy));
      if(dirs.length>0){if(Math.random()<0.01){const seal=seals.filter(s=>!s.collected)[Math.floor(Math.random()*seals.filter(s=>!s.collected).length)];if(seal)satoshi.path=findPath(satoshi.x,satoshi.y,seal.x,seal.y)}else{const[dx,dy]=dirs[Math.floor(Math.random()*dirs.length)];satoshi.x+=dx;satoshi.y+=dy}}}}
  if(state==='playing'&&satoshi.x===player.x&&satoshi.y===player.y){state='caught';lives--;scareShake=30;caughtTimer=180;playScare()}
  heartbeatTimer--;if(heartbeatTimer<=0&&dist<15){const i=Math.max(0,(15-dist)/15);playHeartbeat(i);heartbeatTimer=Math.max(15,50-i*35)}
  if(Math.random()<0.08)particles.push({x:player.x*TILE+(Math.random()-0.5)*200,y:player.y*TILE+(Math.random()-0.5)*200,vx:(Math.random()-0.5)*0.3,vy:-Math.random()*0.4,life:120+Math.random()*120,maxLife:200,size:1+Math.random()*2});
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--});particles=particles.filter(p=>p.life>0);
  if(msgTimer>0)msgTimer--;if(scareShake>0)scareShake--;
}

function render(){
  const W=canvas.width,H=canvas.height;ctx.fillStyle='#030208';ctx.fillRect(0,0,W,H);
  if(state==='title'){drawTitle();return}if(state==='gameover'){drawGameOver();return}if(state==='win'){drawWin();return}
  const camX=player.x*TILE-W/2+TILE/2,camY=player.y*TILE-H/2+TILE/2;
  ctx.save();if(scareShake>0)ctx.translate(Math.random()*10-5,Math.random()*10-5);ctx.translate(-camX,-camY);
  const sX=Math.max(0,Math.floor(camX/TILE)-1),sY=Math.max(0,Math.floor(camY/TILE)-1),eX=Math.min(COLS,Math.ceil((camX+W)/TILE)+1),eY=Math.min(ROWS,Math.ceil((camY+H)/TILE)+1);
  for(let y=sY;y<eY;y++)for(let x=sX;x<eX;x++){
    const tile=MAP[y][x],px=x*TILE,py=y*TILE,d=Math.sqrt((x-player.x)**2+(y-player.y)**2),vr=7+Math.sin(flickerTime)*0.5;
    if(d>vr+2)continue;let a=1;if(d>vr-2)a=Math.max(0,1-(d-vr+2)/2);ctx.globalAlpha=a;
    if(tile===1){ctx.fillStyle='#0d0810';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#1a1225';ctx.fillRect(px,py,TILE,3)}
    else{ctx.fillStyle=(x+y)%2===0?'#13101a':'#16121e';ctx.fillRect(px,py,TILE,TILE);
      if(tile===2){ctx.fillStyle='#1e1535';ctx.fillRect(px+3,py+3,TILE-6,TILE-6);ctx.strokeStyle='#3a2850';ctx.lineWidth=1;ctx.strokeRect(px+3,py+3,TILE-6,TILE-6);ctx.fillStyle='#2a1d3a';ctx.fillRect(px+TILE/2-1,py+5,2,TILE-10)}
      if(tile===6){ctx.fillStyle='#2a1a15';ctx.fillRect(px+TILE/2-4,py,8,TILE);ctx.fillStyle='#c8a84e';ctx.beginPath();ctx.arc(px+TILE/2+3,py+TILE/2,2,0,Math.PI*2);ctx.fill()}
      if(tile===5){ctx.fillStyle=exitOpen?'#0a3a0a':'#1a0a0a';ctx.fillRect(px,py,TILE,TILE);ctx.strokeStyle=exitOpen?'#44ff44':'#662222';ctx.lineWidth=2;ctx.strokeRect(px+2,py+2,TILE-4,TILE-4);for(let i=0;i<3;i++){ctx.fillStyle=exitOpen?'#44ff44':'#662222';ctx.fillRect(px+6+i*10,py+2,2,TILE-4)}}
    }
  }
  // Seals
  ctx.globalAlpha=1;seals.forEach(s=>{if(s.collected)return;const d=Math.sqrt((s.x-player.x)**2+(s.y-player.y)**2);if(d>9)return;
    const glow=0.6+Math.sin(gameTime*0.1)*0.3;ctx.fillStyle=`rgba(255,40,40,${glow})`;ctx.beginPath();ctx.arc(s.x*TILE+TILE/2,s.y*TILE+TILE/2,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,200,200,${glow})`;ctx.font='bold 12px serif';ctx.textAlign='center';ctx.fillText('封',s.x*TILE+TILE/2,s.y*TILE+TILE/2+4);
  });
  // Particles
  particles.forEach(p=>{const a=p.life/p.maxLife*0.25;ctx.fillStyle=`rgba(200,150,100,${a})`;ctx.fillRect(p.x,p.y,p.size,p.size)});
  // Draw Satoshi
  const sDist=Math.sqrt((satoshi.x-player.x)**2+(satoshi.y-player.y)**2);
  if(sDist<10){const sa=Math.min(1,(10-sDist)/3);drawSatoshi(satoshi.x*TILE,satoshi.y*TILE,sa)}
  ctx.globalAlpha=1;
  // Draw Player
  if(state!=='hiding')drawPlayer(player.x*TILE,player.y*TILE);
  // Lantern glow
  const grad=ctx.createRadialGradient(player.x*TILE+TILE/2,player.y*TILE+TILE/2,0,player.x*TILE+TILE/2,player.y*TILE+TILE/2,180);
  grad.addColorStop(0,'rgba(255,200,100,0.05)');grad.addColorStop(0.5,'rgba(255,150,50,0.015)');grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.fillRect(player.x*TILE-200,player.y*TILE-200,400,400);
  // Fog
  const fog=ctx.createRadialGradient(player.x*TILE+TILE/2,player.y*TILE+TILE/2,50,player.x*TILE+TILE/2,player.y*TILE+TILE/2,240);
  fog.addColorStop(0,'rgba(0,0,0,0)');fog.addColorStop(0.6,'rgba(0,0,0,0.8)');fog.addColorStop(1,'rgba(0,0,0,0.98)');
  ctx.fillStyle=fog;ctx.fillRect(camX-10,camY-10,W+20,H+20);
  ctx.restore();
  // HUD
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(10,10,170,44);ctx.strokeStyle='#3a1515';ctx.lineWidth=1;ctx.strokeRect(10,10,170,44);
  ctx.fillStyle='#cc3333';ctx.font='bold 17px Georgia';ctx.textAlign='left';ctx.fillText(`SEALS: ${sealsCollected} / 5`,22,38);
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(W-140,10,130,44);ctx.strokeStyle='#3a1515';ctx.strokeRect(W-140,10,130,44);
  ctx.fillStyle='#cc3333';ctx.font='18px Georgia';ctx.textAlign='right';
  let h='';for(let i=0;i<3;i++)h+=i<lives?'♥ ':'♡ ';ctx.fillText(h.trim(),W-20,38);
  ctx.fillStyle='#555';ctx.font='13px Georgia';ctx.textAlign='center';ctx.fillText(`Night ${night}`,W/2,28);
  if(state==='hiding'){ctx.fillStyle='rgba(20,10,40,0.5)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#8855aa';ctx.font='bold 22px Georgia';ctx.textAlign='center';ctx.fillText('HIDING...',W/2,H/2-10);ctx.fillStyle='#665588';ctx.font='15px Georgia';ctx.fillText('Press SPACE to leave',W/2,H/2+18)}
  if(msgTimer>0){const ma=Math.min(1,msgTimer/30);ctx.fillStyle=`rgba(0,0,0,${ma*0.8})`;ctx.fillRect(W/2-220,H-82,440,40);ctx.strokeStyle=`rgba(200,170,100,${ma*0.3})`;ctx.strokeRect(W/2-220,H-82,440,40);ctx.fillStyle=`rgba(200,170,100,${ma})`;ctx.font='15px Georgia';ctx.textAlign='center';ctx.fillText(msgText,W/2,H-57)}
  if(sDist<10&&state==='playing'){const w=Math.min(1,(10-sDist)/8);ctx.fillStyle=`rgba(100,0,0,${w*0.15*Math.abs(Math.sin(gameTime*0.1))})`;ctx.fillRect(0,0,W,H);const vg=ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.7);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(80,0,0,${w*0.4})`);ctx.fillStyle=vg;ctx.fillRect(0,0,W,H)}
  // CAUGHT
  if(state==='caught'){caughtTimer--;
    if(caughtTimer>120){ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,W,H);
      if(satoshiScare.complete){const iw=Math.min(W*0.75,420),ih=iw*(satoshiScare.naturalHeight/satoshiScare.naturalWidth);const sh=scareShake>0?(Math.random()-0.5)*12:0;ctx.drawImage(satoshiScare,W/2-iw/2+sh,H/2-ih/2+(Math.random()-0.5)*8,iw,ih)}
      ctx.fillStyle=`rgba(120,0,0,${0.2+Math.random()*0.25})`;ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff0000';ctx.font='italic bold 32px Georgia';ctx.textAlign='center';ctx.fillText('"Found you."',W/2,H-50);
    }else if(caughtTimer>30){const f=(caughtTimer-30)/90;ctx.fillStyle=`rgba(0,0,0,${f})`;ctx.fillRect(0,0,W,H);ctx.fillStyle=`rgba(200,0,0,${f})`;ctx.font='22px Georgia';ctx.textAlign='center';ctx.fillText(lives>0?`Night ${night}... You were caught.`:'You could not escape...',W/2,H/2)}
    else if(caughtTimer<=0){if(lives<=0)state='gameover';else{night++;state='playing';resetAfterCatch()}}
  }
  if(gameTime<300&&state==='playing'){const ha=Math.max(0,1-(gameTime/300));ctx.fillStyle=`rgba(150,130,100,${ha*0.6})`;ctx.font='13px Georgia';ctx.textAlign='center';ctx.fillText('WASD/Arrows: Move  |  SPACE: Hide',W/2,H-18)}
}
function resetAfterCatch(){player.x=4;player.y=29;satoshi.x=25;satoshi.y=18;satoshi.chasing=false;satoshi.alert=0;satoshi.path=[];satoshi.speed=Math.max(6,satoshi.speed-2);hideSpot=null;scareShake=0;showMsg(`Night ${night}... Satoshi grows restless.`)}

function drawTitle(){
  const W=canvas.width,H=canvas.height;ctx.fillStyle='#040109';ctx.fillRect(0,0,W,H);
  if(satoshiScare.complete){ctx.globalAlpha=0.18;const iw=W,ih=iw*(satoshiScare.naturalHeight/satoshiScare.naturalWidth);ctx.drawImage(satoshiScare,0,H-ih*0.9,iw,ih);ctx.globalAlpha=1}
  const vg=ctx.createRadialGradient(W/2,H/2,W*0.15,W/2,H/2,W*0.7);vg.addColorStop(0,'rgba(4,1,9,0)');vg.addColorStop(1,'rgba(4,1,9,0.95)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#cc2222';ctx.font='bold 46px Georgia';ctx.textAlign='center';ctx.fillText('NEVERLASTING',W/2,H*0.22);
  ctx.fillStyle='#c8a84e';ctx.font='italic 24px Georgia';ctx.fillText('Escape the Grand Selection',W/2,H*0.30);
  ctx.fillStyle=`rgba(200,50,50,${0.3+Math.sin(Date.now()*0.003)*0.2})`;ctx.fillRect(W*0.2,H*0.34,W*0.6,1);
  ctx.fillStyle='#887766';ctx.font='16px Georgia';const lines=['You are a child trapped in the Grand Selection.','Satoshi hunts these halls, searching for you.','Find 5 Blood Seals and reach the exit to escape.','Hide in wardrobes when he draws near.','You have 3 nights. Each time he grows faster.'];
  lines.forEach((l,i)=>ctx.fillText(l,W/2,H*0.44+i*28));
  const p=0.5+Math.sin(Date.now()*0.004)*0.4;ctx.fillStyle=`rgba(200,170,100,${p})`;ctx.font='bold 21px Georgia';ctx.fillText('[ CLICK OR PRESS ANY KEY ]',W/2,H*0.88);
}
function drawGameOver(){
  const W=canvas.width,H=canvas.height;ctx.fillStyle='#040005';ctx.fillRect(0,0,W,H);
  if(satoshiScare.complete){ctx.globalAlpha=0.35;const iw=320,ih=iw*(satoshiScare.naturalHeight/satoshiScare.naturalWidth);ctx.drawImage(satoshiScare,W/2-iw/2,H*0.08,iw,ih);ctx.globalAlpha=1}
  ctx.fillStyle='#880000';ctx.font='bold 42px Georgia';ctx.textAlign='center';ctx.fillText('YOU DID NOT ESCAPE',W/2,H*0.68);
  ctx.fillStyle='#664444';ctx.font='18px Georgia';ctx.fillText(`Seals found: ${sealsCollected}/5`,W/2,H*0.76);
  const p=0.4+Math.sin(Date.now()*0.004)*0.3;ctx.fillStyle=`rgba(150,100,80,${p})`;ctx.font='19px Georgia';ctx.fillText('[ CLICK TO TRY AGAIN ]',W/2,H*0.9);
}
function drawWin(){
  const W=canvas.width,H=canvas.height;ctx.fillStyle='#020508';ctx.fillRect(0,0,W,H);
  for(let i=0;i<50;i++){const sx=(Math.sin(i*7.3)*0.5+0.5)*W,sy=(Math.cos(i*4.1)*0.5+0.5)*H*0.6;ctx.fillStyle=`rgba(200,200,255,${0.3+Math.sin(Date.now()*0.001+i)*0.3})`;ctx.fillRect(sx,sy,2,2)}
  ctx.fillStyle='#44aa44';ctx.font='bold 42px Georgia';ctx.textAlign='center';ctx.fillText('YOU ESCAPED',W/2,H*0.32);
  ctx.fillStyle='#c8a84e';ctx.font='italic 24px Georgia';ctx.fillText('The Grand Selection could not hold you.',W/2,H*0.43);
  ctx.fillStyle='#668866';ctx.font='18px Georgia';ctx.fillText(`Nights survived: ${night}`,W/2,H*0.56);ctx.fillText(`Seals collected: ${sealsCollected}/5`,W/2,H*0.63);
  const p=0.4+Math.sin(Date.now()*0.004)*0.3;ctx.fillStyle=`rgba(150,200,150,${p})`;ctx.font='19px Georgia';ctx.fillText('[ CLICK TO PLAY AGAIN ]',W/2,H*0.86);
}

function resize(){canvas.width=Math.min(window.innerWidth,960);canvas.height=Math.min(window.innerHeight,720)}
window.addEventListener('resize',resize);resize();
window.addEventListener('keydown',e=>{keys[e.key]=true;if(state==='title'){initAudio();playAmbient();state='playing';initGame()}if((state==='gameover'||state==='win')&&e.key!==' '){lives=3;night=1;state='playing';initGame()}});
window.addEventListener('keyup',e=>{keys[e.key]=false});
canvas.addEventListener('click',()=>{initAudio();if(state==='title'){playAmbient();state='playing';initGame()}if(state==='gameover'||state==='win'){lives=3;night=1;state='playing';initGame()}});
document.querySelectorAll('.dpad button').forEach(b=>{const d=b.dataset.dir;b.addEventListener('touchstart',e=>{e.preventDefault();initAudio();touchDir=d;if(state==='title'){playAmbient();state='playing';initGame()}});b.addEventListener('touchend',e=>{e.preventDefault();if(touchDir===d)touchDir=null})});
document.getElementById('btn-action').addEventListener('touchstart',e=>{e.preventDefault();touchAction=true;initAudio();if(state==='title'){playAmbient();state='playing';initGame()}if(state==='gameover'||state==='win'){lives=3;night=1;state='playing';initGame()}});
(function loop(){update();render();requestAnimationFrame(loop)})();
</script></body></html>
